server {
    listen 443 ssl http2;
    server_name yourdomain.com;
    root /var/www/html/public;

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    index index.php;
    charset utf-8;

    client_max_body_size 20M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Block direct access to .env and hidden files
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Baileys SSE — disable buffering for real-time streaming
    location /baileys/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;

        # Only allow internal calls from Laravel app
        # Remove these lines if Baileys is called externally
        allow 127.0.0.1;
        deny all;
    }

    # Webhook endpoint — Baileys sidecar calls this
    location /webhook/baileys {
        try_files $uri /index.php?$query_string;
        # Rate limit: max 30 req/s per IP
        limit_req zone=webhook burst=10 nodelay;
    }

    # Horizon dashboard — IP whitelist protected
    location /horizon {
        allow 127.0.0.1;
        # allow your-office-ip;
        deny all;
        try_files $uri /index.php?$query_string;
    }

    # Storage public files
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Rate limiting zones
# Add this to /etc/nginx/nginx.conf inside http {} block:
# limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$server_name$request_uri;
}
